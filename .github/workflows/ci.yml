# Smart MCP Pipeline CI/CD
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Vérification structure
        run: |
          test -f SOUL.md && echo "SOUL.md OK" || echo "SOUL.md MISSING"
          test -f smart_mcp.py && echo "smart_mcp.py OK" || echo "smart_mcp.py MISSING"
          test -f dashboard/app.py && echo "dashboard/app.py OK" || echo "dashboard/app.py MISSING"
          ls brain/*.py 2>/dev/null && echo "brain/*.py OK" || echo "brain/*.py MISSING"
          ls diagrams/*.drawio 2>/dev/null && echo "Diagrams OK" || echo "Diagrams MISSING"

  test:
    name: Tests (214 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installation dépendances
        run: pip install -r requirements.txt
      - name: Seed ChromaDB de test
        run: |
          python << 'PYEOF'
import os, tempfile
os.environ['CI_CHROMA_PATH'] = tempfile.mkdtemp()
from brain.seed_patterns import seed as seed_brain
seed_brain(persist_dir=os.environ['CI_CHROMA_PATH'])
print(f'ChromaDB seedee dans {os.environ["CI_CHROMA_PATH"]}')
PYEOF
      - name: Vérification imports
        run: |
          python << 'PYEOF'
import sys
sys.path.insert(0, '.')
from brain.rag import RAGBrain
from brain.seed_patterns import seed
from brain.shape_templates import SHAPE_TEMPLATES, STYLES
from mcp_client.drawio import DrawioMCPClient
print('Tous les imports OK')
PYEOF
      - name: Lancement tests
        env:
          CI: "true"
        run: python ci_tests.py
      - name: Upload résultats
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-results
          path: ci_results.json
          retention-days: 7

  quality:
    name: Qualité code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyflakes
      - name: Pyflakes brain/
        run: pyflakes brain/ 2>&1 | head -30 || true
      - name: Pyflakes dashboard/
        run: pyflakes dashboard/ 2>&1 | head -30 || true
      - name: Pyflakes mcp_client/
        run: pyflakes mcp_client/ 2>&1 | head -30 || true
      - name: Pyflakes models/
        run: pyflakes models/ 2>&1 | head -30 || true
      - name: Pyflakes racine
        run: |
          for f in smart_mcp.py smart_mcp_server.py ci_tests.py; do
            pyflakes "$f" 2>&1 | head -10 || true
          done