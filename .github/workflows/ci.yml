# Smart MCP Pipeline CI/CD
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pyflakes src/ dashboard/ 2>&1 || true
      - run: |
          test -f SOUL.md && echo "SOUL.md OK" || echo "SOUL.md MISSING"
          ls skills/ 2>/dev/null && echo "Skills OK" || echo "Skills MISSING"
          ls diagrams/*.drawio 2>/dev/null && echo "Diagrams OK" || echo "Diagrams MISSING"

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -c "import sys; sys.path.insert(0, '.'); from src.rag import RAGBrain; print('Imports OK')"
      - run: python ci_tests.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results
          path: results.json
          retention-days: 7
